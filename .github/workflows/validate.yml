name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  lint:
    name: Typing & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Ruff check
        run: ruff check custom_components tests

      - name: Ruff format check
        run: ruff format --check custom_components tests

      - name: Mypy (strict via pyproject)
        run: mypy custom_components/sensoredlife/

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Pytest with coverage gate
        run: pytest tests -q --cov=custom_components.sensoredlife --cov-fail-under=95

  syntax-floor:
    # The oldest supported HA (2024.12) runs Python 3.12 — make sure every
    # shipped module still parses there, so a formatter/lint pass can never
    # smuggle in newer-only syntax (e.g. PEP 758 unparenthesized except).
    name: Syntax floor (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile on the support floor
        run: python -m compileall -q custom_components/
