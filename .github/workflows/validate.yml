name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  tests:
    name: Tests, typing, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Pytest with coverage gate
        run: pytest tests -q --cov=custom_components.sensoredlife --cov-fail-under=95

      - name: Mypy (strict via pyproject)
        run: mypy custom_components/sensoredlife/

      - name: Ruff
        run: ruff check custom_components tests
