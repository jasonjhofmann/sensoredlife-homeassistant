rules:
  # --- Bronze -------------------------------------------------------------
  action-setup:
    status: exempt
    comment: The integration registers no service actions.
  appropriate-polling: done
  brands:
    status: done
    comment: >-
      Icon + logo (light/dark) bundled in custom_components/sensoredlife/brand/.
      Home Assistant 2026.3+ serves these via the local brands proxy;
      home-assistant/brands no longer accepts custom-integration icons.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency:
    status: done
    comment: No third-party runtime requirements; the API client lives in-repo.
  docs-actions:
    status: exempt
    comment: The integration registers no service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities derive from CoordinatorEntity; no external event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # --- Silver -------------------------------------------------------------
  action-exceptions:
    status: exempt
    comment: The integration registers no service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration exposes no options flow / configurable options.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator logs the first failure and the recovery once.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # --- Gold ---------------------------------------------------------------
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Devices are bound to a cloud account; there is nothing to discover
      on the local network.
  discovery-update-info:
    status: exempt
    comment: No network discovery (cloud account); nothing to update from it.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: Entities use static/device-class icons; no state-dependent icons.
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: The only user-actionable failure is bad credentials, handled by the
      reauthentication flow.
  stale-devices:
    status: done
    comment: Pruned only after 3 consecutive polls missing, so a transient
      partial response never deletes a device; a pruned device that reappears
      gets its device and entities recreated without a restart.

  # --- Platinum -----------------------------------------------------------
  async-dependency:
    status: done
    comment: The API client is fully async (aiohttp); no sync dependencies.
  inject-websession:
    status: done
    comment: The client takes an injected aiohttp ClientSession.
  strict-typing:
    status: done
    comment: No external runtime dependency; the integration passes mypy --strict.
